name: Export MMS-TTS Models

on:
  workflow_dispatch:
    inputs:
      languages:
        description: 'Language codes (comma-separated, e.g. lao,zho,eng). Leave empty for all.'
        required: false
        default: 'lao,zho,eng,jpn,kor,tha,vie,fra,deu,spa'
      release_tag:
        description: 'Release tag to upload to'
        required: false
        default: 'mms-tts-latest'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "numpy<2" torch==2.1.0 transformers==4.36.0 onnx onnxruntime uroman

      - name: Export MMS-TTS to ONNX
        env:
          LANGUAGES: ${{ github.event.inputs.languages }}
        run: |
          python3 tools/export_mms_tts.py $(echo "$LANGUAGES" | tr ',' ' ')

      - name: List output files
        run: |
          echo "=== Checking mms-tts-output ==="
          ls -lhR mms-tts-output/ || echo "WARNING: mms-tts-output/ does not exist or is empty"

      - name: Upload MMS-TTS models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-tts-models
          path: mms-tts-output/*
          retention-days: 30

      - name: Upload models to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          onnx_COUNT=$(ls mms-tts-output/*.onnx 2>/dev/null | wc -l)
          echo "Found $onnx_COUNT ONNX files to upload"
          if [ "$onnx_COUNT" -eq 0 ]; then
            echo "ERROR: No ONNX files generated!"
            exit 1
          fi

          # Create release if it doesn't exist
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG not found, creating..."
            gh release create "$RELEASE_TAG" --title "MMS-TTS Models" --notes "Auto-generated MMS-TTS ONNX models" --latest=false
          fi

          echo "Uploading to release $RELEASE_TAG..."
          gh release upload "$RELEASE_TAG" mms-tts-output/* --clobber
          echo "Upload completed"
