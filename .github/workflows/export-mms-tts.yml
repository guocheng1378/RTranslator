name: Export MMS-TTS Models

on:
  workflow_dispatch:
    inputs:
      languages:
        description: 'Language codes (comma-separated, e.g. lao,zho,eng). Leave empty for all.'
        required: false
        default: 'lao,zho,eng,jpn,kor,tha,vie,fra,deu,spa'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch==2.1.0 transformers==4.36.0 onnx onnxruntime

      - name: Export MMS-TTS to ONNX
        run: |
          python3 tools/export_mms_tts.py $(echo "${{ github.event.inputs.languages }}" | tr ',' ' ')

      - name: List output files
        run: |
          echo "=== Checking mms-tts-output ==="
          ls -lhR mms-tts-output/ || echo "WARNING: mms-tts-output/ does not exist or is empty"

      - name: Upload MMS-TTS models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-tts-models
          path: mms-tts-output/*
          retention-days: 30

      - name: Upload models to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ONNX_COUNT=$(ls mms-tts-output/*.onnx 2>/dev/null | wc -l)
          echo "Found $ONNX_COUNT ONNX files to upload"
          if [ "$ONNX_COUNT" -eq 0 ]; then
            echo "ERROR: No ONNX files generated!"
            exit 1
          fi
          gh release upload 3.0.0 mms-tts-output/* --clobber
          echo "Upload completed"
