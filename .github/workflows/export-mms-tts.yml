name: Export MMS-TTS Models

on:
  workflow_dispatch:
    inputs:
      languages:
        description: 'Language codes (comma-separated, e.g. lao,zho,eng). Leave empty for all.'
        required: false
        default: 'lao,zho,eng,jpn,kor,tha,vie,fra,deu,spa'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch transformers onnx onnxruntime

      - name: Export MMS-TTS to ONNX
        run: |
          python3 tools/export_mms_tts.py $(echo "${{ github.event.inputs.languages }}" | tr ',' ' ')

      - name: List output files
        run: |
          echo "=== Checking mms-tts-output ==="
          ls -lhR mms-tts-output/ || echo "WARNING: mms-tts-output/ does not exist or is empty"

      - name: Upload MMS-TTS models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-tts-models
          path: mms-tts-output/*
          retention-days: 30

      - name: Create GitHub Release and upload models
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if files exist
          if [ ! -d "mms-tts-output" ] || [ -z "$(ls -A mms-tts-output/ 2>/dev/null)" ]; then
            echo "ERROR: No files found in mms-tts-output/"
            exit 1
          fi

          FILE_COUNT=$(ls mms-tts-output/ | wc -l)
          echo "Found $FILE_COUNT files to upload"

          # Try to create release (will fail if tag already exists, that is OK)
          gh release create 3.0.0 \
            --title "MMS-TTS Models v3.0.0" \
            --notes "MMS-TTS ONNX models for RTranslator offline TTS." \
            --prerelease && echo "Release created" || echo "Release exists, uploading..."

          # Upload files
          gh release upload 3.0.0 mms-tts-output/* --clobber
          echo "Upload completed"
